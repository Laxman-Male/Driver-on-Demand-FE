<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Past Rides</title>
  
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 
</head>
<body>

  <div class="past-rides-container">
     <app-driver-common-nav></app-driver-common-nav>
    <h1 class="page-title">Past Rides</h1>

    <div class="ride-card">
      <div class="card-header">
        <div class="user-info">
          <div class="user-name">Amit Verma</div>
          <div class="ride-badge">Hourly ride</div>
        </div>
        <div class="ride-date">
          <i class="fa-regular fa-calendar"></i> 2025-11-15
        </div>
      </div>
      <div class="card-body">
        <div class="location-row">
          <div class="loc-icon icon-green"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Pickup</span>
            <span class="loc-value">Powai, Mumbai</span>
          </div>
        </div>
        <div class="location-row">
          <div class="loc-icon icon-red"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Drop</span>
            <span class="loc-value">Churchgate, Mumbai</span>
          </div>
        </div>
      </div>
    </div>

    <div class="ride-card">
      <div class="card-header">
        <div class="user-info">
          <div class="user-name">Neha Singh</div>
          <div class="ride-badge">Outstation</div>
        </div>
        <div class="ride-date">
          <i class="fa-regular fa-calendar"></i> 2025-11-14
        </div>
      </div>
      <div class="card-body">
        <div class="location-row">
          <div class="loc-icon icon-green"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Pickup</span>
            <span class="loc-value">Mumbai</span>
          </div>
        </div>
        <div class="location-row">
          <div class="loc-icon icon-red"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Drop</span>
            <span class="loc-value">Nashik</span>
          </div>
        </div>
      </div>
    </div>

    <div class="ride-card">
      <div class="card-header">
        <div class="user-info">
          <div class="user-name">Rahul Kapoor</div>
          <div class="ride-badge">One way</div>
        </div>
        <div class="ride-date">
          <i class="fa-regular fa-calendar"></i> 2025-11-13
        </div>
      </div>
      <div class="card-body">
        <div class="location-row">
          <div class="loc-icon icon-green"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Pickup</span>
            <span class="loc-value">Vashi</span>
          </div>
        </div>
        <div class="location-row">
          <div class="loc-icon icon-red"><i class="fa-solid fa-location-dot"></i></div>
          <div class="loc-details">
            <span class="loc-label">Drop</span>
            <span class="loc-value">Airoli</span>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
