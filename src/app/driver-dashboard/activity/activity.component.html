<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Past Rides</title>
  
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 
</head>
<body>

  <div class="past-rides-container">
  <app-driver-common-nav></app-driver-common-nav>
  <h1 class="page-title">Past Rides</h1>

  <div class="ride-card" *ngFor="let ride of pastRides">
    <div class="card-header">
      <div class="user-info">
        <div class="user-name">{{ ride.name }}</div>
        <div class="ride-badge">{{ ride.rideType }}</div>
      </div>
      <div class="ride-date">
        <i class="fa-regular fa-calendar"></i> {{ ride.dateTime }}
      </div>
    </div>
    <div class="card-body">
      <div class="location-row">
        <div class="loc-icon icon-green"><i class="fa-solid fa-location-dot"></i></div>
        <div class="loc-details">
          <span class="loc-label">Pickup</span>
          <span class="loc-value">{{ ride.pickup }}</span>
        </div>
      </div>
      <div class="location-row">
        <div class="loc-icon icon-red"><i class="fa-solid fa-location-dot"></i></div>
        <div class="loc-details">
          <span class="loc-label">Drop</span>
          <span class="loc-value">{{ ride.drop }}</span>
        </div>
      </div>
      <div class="ride-extra">
        <span>Car: {{ ride.car }}</span> |
        <span>Duration: {{ ride.duration }}</span> |
        <span>Distance: {{ ride.distance }}</span>
      </div>
    </div>
  </div>

  <div *ngIf="pastRides.length === 0">
    <p>No rides completed yet.</p>
  </div>
</div>

</body>
</html>
